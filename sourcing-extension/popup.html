<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이게머고 소싱툴</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <div class="header">
      <span class="logo">🛒 소싱툴</span>
      <button id="btnQueue" class="queue-btn">📋 큐 관리 <span id="queueCount" class="badge">0</span></button>
    </div>

    <!-- 로딩 -->
    <div id="stateLoading" class="state">
      <div class="spinner"></div>
      <p>페이지 파싱 중...</p>
    </div>

    <!-- 상품 페이지 아님 -->
    <div id="stateNotProduct" class="state" style="display:none">
      <p class="hint">알리익스프레스 또는 쿠팡<br>상품 페이지에서 실행하세요.</p>
      <p class="hint-sub">지원 URL:<br>aliexpress.com/item/*<br>coupang.com/vp/products/*</p>
    </div>

    <!-- 미리보기 & 추가 폼 -->
    <div id="statePreview" style="display:none">
      <div class="img-wrap">
        <img id="previewImg" src="" alt="">
      </div>

      <div class="form">
        <label>제목</label>
        <input id="inpTitle" type="text" placeholder="상품명 (드립체로 수정 가능)">

        <label>카테고리</label>
        <select id="selCategory">
          <option value="mild">이게 머고? — 순한맛</option>
          <option value="medium">이게? 머고??? — 보통맛</option>
          <option value="hot">이게??? 머고??????? — 매운맛</option>
        </select>

        <label>이미지 URL <span class="muted">(수정 가능)</span></label>
        <input id="inpImageUrl" type="text" placeholder="https://...">

        <label>상품 URL</label>
        <input id="inpProductUrl" type="text" readonly class="readonly">
      </div>

      <button id="btnAdd" class="primary-btn">큐에 추가</button>
    </div>

    <!-- 추가 완료 -->
    <div id="stateSuccess" style="display:none">
      <p class="success-msg">✅ 큐에 추가됐어요!</p>
      <button id="btnGoQueue" class="secondary-btn">큐 관리 열기</button>
      <button id="btnAddMore" class="ghost-btn">다른 상품 추가</button>
    </div>

  </div>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
