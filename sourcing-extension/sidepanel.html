<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이게머고 소싱툴</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <div class="header">
      <span class="logo">🛒 소싱툴</span>
      <div class="header-right">
        <button id="btnRefresh" class="icon-btn" title="현재 탭 다시 파싱">↻</button>
        <button id="btnQueue" class="queue-btn">📋 큐 <span id="queueCount" class="badge">0</span></button>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="stateLoading" class="state">
      <div class="spinner"></div>
      <p>파싱 중...</p>
    </div>

    <!-- 상품 페이지 아님 -->
    <div id="stateNotProduct" class="state" style="display:none">
      <div class="not-product-icon">🛍️</div>
      <p class="hint">알리익스프레스 또는 쿠팡<br>상품 페이지로 이동하면<br>자동으로 파싱돼요.</p>
      <p class="hint-sub">지원 페이지<br>aliexpress.com/item/*<br>coupang.com/vp/products/*</p>
    </div>

    <!-- 미리보기 & 추가 폼 -->
    <div id="statePreview" style="display:none">

      <!-- ① 상품 정보 -->
      <div class="form">
        <label>제목</label>
        <textarea id="inpTitle" rows="3" placeholder="드립형 제목으로 수정하세요"></textarea>

        <label>가격</label>
        <input id="inpPrice" type="text" placeholder="₩0,000">

        <label>카테고리</label>
        <select id="selCategory">
          <option value="mild">😐 이게 머고? — 순한맛</option>
          <option value="medium">😲 이게? 머고??? — 보통맛</option>
          <option value="hot">🤯 이게??? 머고??????? — 매운맛</option>
        </select>

        <label>상품 링크</label>
        <input id="inpProductUrl" type="text" readonly class="readonly">
      </div>

      <div class="divider"></div>

      <!-- ② 이미지 선택 -->
      <div class="img-section">
        <div class="img-section-header">
          <span class="section-label">이미지 선택</span>
          <span id="imgSelCount" class="img-sel-count">0개 선택</span>
        </div>

        <!-- 파싱된 이미지 그리드 -->
        <div id="imageGrid" class="img-grid"></div>

        <!-- 직접 추가 토글 버튼 -->
        <button id="btnDirectAdd" class="direct-add-toggle">＋ 이미지 직접 추가</button>

        <!-- 직접 추가 패널 -->
        <div id="directAddPanel" class="direct-add-panel" style="display:none">
          <div class="direct-tabs">
            <button class="dtab active" data-tab="file">📁 파일 업로드</button>
            <button class="dtab" data-tab="url">🔗 URL 입력</button>
          </div>
          <div id="dtabFile">
            <label class="file-drop-zone" id="fileDropZone">
              <span>클릭하거나 파일을 여기에 드래그</span>
              <input type="file" id="directFile" accept="image/*" multiple style="display:none">
            </label>
          </div>
          <div id="dtabUrl" style="display:none">
            <div class="url-row">
              <input type="text" id="directUrl" placeholder="https://...">
              <button id="btnAddUrl">추가</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ③ 큐에 추가 버튼 (sticky) -->
      <div class="action-bar">
        <button id="btnAdd" class="primary-btn">큐에 추가</button>
      </div>
    </div>

    <!-- 추가 완료 -->
    <div id="stateSuccess" style="display:none">
      <div class="success-icon">✅</div>
      <p class="success-title">큐에 추가됐어요!</p>
      <p class="success-sub">다음 상품 페이지로 이동하면<br>자동으로 파싱됩니다.</p>
      <button id="btnGoQueue" class="secondary-btn">큐 관리 열기 →</button>
      <button id="btnAddMore" class="ghost-btn">↻ 현재 페이지 다시 파싱</button>
    </div>

  </div>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
